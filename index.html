<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Currículo de Aleson Pereira Pungirum — Desenvolvedor Full Stack. Node.js, Python, React e IA na prática." />
  <meta name="theme-color" content="#0f1226" />
  <title>Aleson Pereira Pungirum · Currículo</title>

  <!-- Open Graph (preview ao compartilhar) -->
  <meta property="og:title" content="Aleson Pereira Pungirum — Desenvolvedor Full Stack" />
  <meta property="og:description" content="8+ anos com Node.js, Python, React e IA na prática. Veja o currículo." />
  <meta property="og:type" content="profile" />
  <meta property="og:image" content="icons/icon-512.png?v=2" />

  <link rel="manifest" href="manifest.webmanifest?v=2" />
  <link rel="icon" href="icons/icon-192.png?v=2" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Aleson · CV" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css?v=4" />
</head>
<body>
  <div class="aurora-bg" aria-hidden="true"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>

  <main class="cv">
    <div class="pdf-bar">
      <span class="pdf-label">📄 Currículo (PDF)</span>
      <div class="zoom">
        <button id="zoomOut" aria-label="Diminuir zoom">−</button>
        <span id="zoomLevel">100%</span>
        <button id="zoomIn" aria-label="Aumentar zoom">+</button>
      </div>
    </div>

    <div id="pdf" class="pdf-view" role="document" aria-label="Currículo em PDF">
      <div class="pdf-status" id="pdfStatus">Carregando currículo…</div>
    </div>

    <a class="btn primary wide" href="curriculo-aleson-pungirum.pdf" download>
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>
      Baixar em PDF
    </a>
    <p class="foot">© <span id="yr"></span> Aleson Pereira Pungirum · Desenvolvedor Full Stack</p>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    const PDF_URL = 'curriculo-aleson-pungirum.pdf';
    const container = document.getElementById('pdf');
    const statusEl = document.getElementById('pdfStatus');
    const zoomLabel = document.getElementById('zoomLevel');
    let pdfDoc = null, zoom = 1, rendering = false, pending = false;

    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    async function renderAll() {
      if (!pdfDoc) return;
      if (rendering) { pending = true; return; }
      rendering = true;
      const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
      const innerW = container.clientWidth - 20; // desconta padding
      container.querySelectorAll('canvas').forEach(c => c.remove());
      for (let n = 1; n <= pdfDoc.numPages; n++) {
        const page = await pdfDoc.getPage(n);
        const base = page.getViewport({ scale: 1 });
        const scale = (innerW / base.width) * zoom;      // fit-to-width * zoom
        const vp = page.getViewport({ scale: scale * dpr });
        const canvas = document.createElement('canvas');
        canvas.className = 'pdf-page';
        canvas.width = vp.width; canvas.height = vp.height;
        canvas.style.width = (base.width * scale) + 'px';
        canvas.style.height = (base.height * scale) + 'px';
        container.appendChild(canvas);
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      }
      rendering = false;
      if (pending) { pending = false; renderAll(); }
    }

    function loadPdf() {
      if (!window.pdfjsLib) { statusEl.textContent = 'Não foi possível carregar o visualizador. Toque em "Baixar em PDF".'; return; }
      pdfjsLib.getDocument(PDF_URL).promise.then(doc => {
        pdfDoc = doc; if (statusEl) statusEl.remove(); renderAll();
      }).catch(() => { statusEl.textContent = 'Não foi possível carregar o PDF. Toque em "Baixar em PDF".'; });
    }

    function setZoom(z) { zoom = Math.max(0.5, Math.min(3, Math.round(z * 100) / 100)); zoomLabel.textContent = Math.round(zoom * 100) + '%'; renderAll(); }
    document.getElementById('zoomIn').addEventListener('click', () => setZoom(zoom + 0.25));
    document.getElementById('zoomOut').addEventListener('click', () => setZoom(zoom - 0.25));

    let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(renderAll, 250); });
    window.addEventListener('load', loadPdf);

    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  </script>
</body>
</html>
